name: Deploy Front to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'galerie-front/**'
      - '.github/workflows/deploy-front.yml'
  workflow_run:
    workflows: ["Deploy CMS to Clever Cloud"]
    types: [completed]
    branches: [master]
  repository_dispatch:
    types: [strapi-content-update]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: galerie-front/yarn.lock

      - name: Install & build
        working-directory: galerie-front
        env:
          STRAPI_API_URL: ${{ secrets.STRAPI_API_URL }}
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
          PUBLIC_STRAPI_API_URL: ${{ secrets.STRAPI_API_URL }}
          SITE_URL: https://marceautassin.github.io
          BASE_PATH: /GalerieLB
        run: |
          yarn install --frozen-lockfile
          yarn build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: galerie-front/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
